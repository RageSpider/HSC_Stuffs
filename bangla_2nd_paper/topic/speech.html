<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভাষণ রচনা | বাংলা ২য় পত্র</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.maateen.me/bangla/font.css" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../topic-css/speech.css">
</head>
<body class="theme-speech"> 

    <div id="navbar-placeholder"></div>

    <main class="topic-main">
        <header class="topic-hero">
            
            <!-- Static Sound Frequencies & Bubble Background -->
            <div class="hero-speech-bg">
                <!-- Abstract Voice Waveform -->
                <div class="static-frequencies">
                    <div class="freq-bar" style="height: 30%;"></div>
                    <div class="freq-bar" style="height: 60%;"></div>
                    <div class="freq-bar" style="height: 40%;"></div>
                    <div class="freq-bar" style="height: 100%;"></div>
                    <div class="freq-bar" style="height: 70%;"></div>
                    <div class="freq-bar" style="height: 90%;"></div>
                    <div class="freq-bar" style="height: 45%;"></div>
                    <div class="freq-bar" style="height: 80%;"></div>
                    <div class="freq-bar" style="height: 50%;"></div>
                    <div class="freq-bar" style="height: 20%;"></div>
                </div>
                <!-- Stylized Speech Bubble & Mic -->
                <div class="static-bubble">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="bubble-mic">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" x2="12" y1="19" y2="22"></line>
                    </svg>
                </div>
            </div>

            <div class="hero-content speech-hero-card">
                <span class="topic-badge bn-text"><i data-lucide="mic"></i> নির্মিতি: প্রশ্ন ৮(খ)</span>
                <h1 class="bn-text">ভাষণ রচনা</h1>
                <p class="bn-text marks-info">এই অংশে মোট <strong>১০ নম্বর</strong> বরাদ্দ রয়েছে।</p>
                <p class="bn-text hero-desc">পরীক্ষায় সাধারণত কোনো নির্দিষ্ট বিষয় বা অনুষ্ঠানের ওপর ভিত্তি করে একটি ভাষণ বা বক্তৃতা প্রস্তুত করতে বলা হয়। নিচের তালিকা থেকে গুরুত্বপূর্ণ ভাষণগুলো অনুশীলন করো।</p>
            </div>
            
        </header>

        <div class="pages-container container">
            
            <div class="smart-toolbar">
                <div class="search-box">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="global-search" class="bn-text" placeholder="ভাষণের বিষয় খুঁজুন...">
                    <button id="clearSearch" class="clear-btn" aria-label="Clear Search"><i data-lucide="x"></i></button>
                </div>
                
                <div class="filter-group bn-text">
                    <div class="filter-item">
                        <i data-lucide="building-2"></i>
                        <select id="filter-board" class="bn-text">
                            <option value="all">সব বোর্ড</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <i data-lucide="calendar"></i>
                        <select id="filter-year" class="bn-text">
                            <option value="all">সব সাল</option>
                        </select>
                    </div>
                    <button id="toggle-favorites" class="btn-favorite-filter bn-text">
                        <i data-lucide="heart"></i> <span class="hide-mobile">পছন্দ</span>
                    </button>
                </div>
            </div>

            <section id="section-list" class="pseudo-page active">
                <div class="speech-grid" id="speech-container">
                    <div class="loading-state">
                        <i data-lucide="loader-2" class="spin"></i>
                        <p class="bn-text">ভাষণ লোড হচ্ছে...</p>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/include-navbar.js"></script>
    <script src="../js/include-footer.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../topic-js/speech.js"></script>

</body>
</html>
