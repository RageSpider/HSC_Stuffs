<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Theme QA Toolkit | Vanilla JS</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.maateen.me/bangla/font.css" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CSS (via CDN for standalone use) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                        bangla: ['Bangla', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #018edd; /* Physics Primary Blue */
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 50;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300 antialiased h-screen flex flex-col overflow-hidden dark:bg-slate-950 dark:text-slate-200" id="app-body">

    <!-- Header -->
    <header class="flex-shrink-0 sticky top-0 z-10 flex justify-between items-center px-6 py-4 border-b border-slate-200 bg-white/80 backdrop-blur-md dark:border-slate-800 dark:bg-slate-950/80 transition-colors">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-[#018edd] text-white rounded-lg">
                <i data-lucide="atom" class="w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold font-poppins tracking-tight">Physics Theme <span class="text-[#018edd]">Toolkit</span></h1>
        </div>
        <button 
            onclick="toggleGlobalMode()"
            id="global-mode-btn"
            class="flex items-center gap-2 px-4 py-2 rounded-full font-medium text-sm transition-colors bg-slate-200 hover:bg-slate-300 text-slate-900 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-white"
        >
            <i data-lucide="moon" class="w-4 h-4" id="global-mode-icon"></i>
            <span id="global-mode-text" class="font-poppins">Dark App UI</span>
        </button>
    </header>

    <!-- Main Workspace Layout -->
    <div class="flex flex-col lg:flex-row flex-grow overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-full lg:w-80 flex-shrink-0 overflow-y-auto border-r border-slate-200 bg-slate-50/50 p-4 dark:border-slate-800 dark:bg-slate-900/50 transition-colors font-poppins">
            
            <div class="mb-6">
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 ml-2">Global Theme</h2>
                <div class="space-y-1" id="global-list"></div>
            </div>

            <div>
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 ml-2">Chapter Themes</h2>
                <div class="space-y-1" id="chapter-list"></div>
            </div>

        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-grow overflow-y-auto p-6 lg:p-10 space-y-10" id="main-content">
            <!-- Rendered by JS -->
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast flex items-center gap-2 shadow-lg shadow-blue-500/20 font-poppins">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-msg">Copied!</span>
    </div>

    <!-- Application Logic -->
    <script>
        // --- DATA: ALL 11 PHYSICS THEMES ---
        const THEMES = [
            { 
                id: "global-physics", category: "Global", title: "Physics Master Theme", sub: "Global Base Theme", icon: "orbit", 
                desc: "The core blue/yellow dynamic scheme representing the fundamental forces of the universe.", 
                colors: { primary: "#018edd", accent: "#f5e641", light: { bg: "#f0f8ff", text: "#002b4d" }, dark: { bg: "#001122", text: "#e6f2ff" } } 
            },
            { 
                id: "chapter-1", category: "Chapters", title: "ভৌত জগৎ ও পরিমাপ", sub: "Chapter 01", icon: "ruler", 
                desc: "পরিমাপের ত্রুটি, মাত্রা সমীকরণ ও স্লাইড ক্যালিপার্সের ব্যবহার। (Theme: Steel/Precision)", 
                colors: { primary: "#475569", accent: "#3b82f6", light: { bg: "#f8fafc", text: "#0f172a" }, dark: { bg: "#020617", text: "#f1f5f9" } } 
            },
            { 
                id: "chapter-2", category: "Chapters", title: "ভেক্টর", sub: "Chapter 02", icon: "navigation", 
                desc: "ডট গুণন, ক্রস গুণন, নদী-নৌকা সমস্যা ও ভেক্টর ক্যালকুলাস। (Theme: Indigo/Directional Space)", 
                colors: { primary: "#4f46e5", accent: "#ec4899", light: { bg: "#eef2ff", text: "#1e1b4b" }, dark: { bg: "#1e1b4b", text: "#e0e7ff" } } 
            },
            { 
                id: "chapter-3", category: "Chapters", title: "গতিবিদ্যা", sub: "Chapter 03", icon: "wind", 
                desc: "প্রাসের গতি, পড়ন্ত বস্তু এবং গতির সমীকরণসমূহ। (Theme: Cyan/Velocity & Motion)", 
                colors: { primary: "#0891b2", accent: "#f59e0b", light: { bg: "#ecfeff", text: "#164e63" }, dark: { bg: "#083344", text: "#cffafe" } } 
            },
            { 
                id: "chapter-4", category: "Chapters", title: "নিউটনীয় বলবিদ্যা", sub: "Chapter 04", icon: "anchor", 
                desc: "জড়তার ভ্রামক, কেন্দ্রমুখী বল, ঘর্ষণ ও রকেটের গতি। (Theme: Rust Red/Solid Force & Mass)", 
                colors: { primary: "#b91c1c", accent: "#d97706", light: { bg: "#fef2f2", text: "#450a0a" }, dark: { bg: "#450a0a", text: "#fecaca" } } 
            },
            { 
                id: "chapter-5", category: "Chapters", title: "কাজ, শক্তি ও ক্ষমতা", sub: "Chapter 05", icon: "zap", 
                desc: "কাজের প্রকারভেদ, শক্তির সংরক্ষণশীলতা এবং স্প্রিং বল। (Theme: Amber/Energy & Power)", 
                colors: { primary: "#d97706", accent: "#2563eb", light: { bg: "#fffbeb", text: "#78350f" }, dark: { bg: "#451a03", text: "#fef3c7" } } 
            },
            { 
                id: "chapter-6", category: "Chapters", title: "মহাকর্ষ ও অভিকর্ষ", sub: "Chapter 06", icon: "globe", 
                desc: "কেপলারের সূত্র, মুক্তিবেগ, কৃত্রিম উপগ্রহ এবং g এর পরিবর্তন। (Theme: Deep Space Blue/Gravity)", 
                colors: { primary: "#4338ca", accent: "#10b981", light: { bg: "#f5f5ff", text: "#1e1b4b" }, dark: { bg: "#0a0a2a", text: "#c7d2fe" } } 
            },
            { 
                id: "chapter-7", category: "Chapters", title: "পদার্থের গাঠনিক ধর্ম", sub: "Chapter 07", icon: "layers", 
                desc: "স্থিতিস্থাপকতা, ইয়ং এর গুণাঙ্ক, পৃষ্ঠটান ও সান্দ্রতা। (Theme: Emerald/Material Structure)", 
                colors: { primary: "#059669", accent: "#8b5cf6", light: { bg: "#ecfdf5", text: "#064e3b" }, dark: { bg: "#064e3b", text: "#d1fae5" } } 
            },
            { 
                id: "chapter-8", category: "Chapters", title: "পর্যাবৃত্ত গতি", sub: "Chapter 08", icon: "activity", 
                desc: "সরল ছন্দিত স্পন্দন, সরল দোলক এবং লিসাজুর চিত্র। (Theme: Rose/Oscillation & Frequency)", 
                colors: { primary: "#e11d48", accent: "#06b6d4", light: { bg: "#fff1f2", text: "#881337" }, dark: { bg: "#4c0519", text: "#ffe4e6" } } 
            },
            { 
                id: "chapter-9", category: "Chapters", title: "তরঙ্গ", sub: "Chapter 09", icon: "waves", 
                desc: "স্থির তরঙ্গ, বিট, তীব্রতা লেভেল এবং ডপলার ক্রিয়া। (Theme: Light Blue/Sound & Water Waves)", 
                colors: { primary: "#0284c7", accent: "#14b8a6", light: { bg: "#f0f9ff", text: "#0c4a6e" }, dark: { bg: "#082f49", text: "#e0f2fe" } } 
            },
            { 
                id: "chapter-10", category: "Chapters", title: "আদর্শ গ্যাস ও গতিতত্ত্ব", sub: "Chapter 10", icon: "thermometer", 
                desc: "বয়েল-চার্লসের সূত্র, মূল গড় বর্গবেগ, শিশিরাঙ্ক ও আপেক্ষিক আর্দ্রতা। (Theme: Orange/Heat & Thermodynamics)", 
                colors: { primary: "#ea580c", accent: "#eab308", light: { bg: "#fff7ed", text: "#7c2d12" }, dark: { bg: "#431407", text: "#ffedd5" } } 
            }
        ];

        // --- STATE ---
        let activeTheme = THEMES[0];
        let isDarkMode = false;

        // --- CORE FUNCTIONS ---

        function toggleGlobalMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            
            const icon = document.getElementById('global-mode-icon');
            const text = document.getElementById('global-mode-text');
            
            icon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            text.textContent = isDarkMode ? 'Light App UI' : 'Dark App UI';
            
            lucide.createIcons();
            renderSidebar(); 
        }

        function selectTheme(themeId) {
            activeTheme = THEMES.find(t => t.id === themeId);
            renderSidebar();
            renderMain();
        }

        function copyToClipboard(text, message = 'Copied!') {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast(message));
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { 
                    document.execCommand('copy'); 
                    showToast(message);
                } catch (err) { 
                    console.error('Failed to copy', err); 
                }
                textArea.remove();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // --- RENDERING FUNCTIONS ---

        function renderSidebar() {
            const globalList = document.getElementById('global-list');
            const chapterList = document.getElementById('chapter-list');
            
            globalList.innerHTML = '';
            chapterList.innerHTML = '';

            THEMES.forEach(theme => {
                const isActive = activeTheme.id === theme.id;
                
                let bgClasses = 'hover:bg-slate-500/10';
                if (isActive) {
                    bgClasses = isDarkMode 
                        ? 'bg-slate-800 shadow-sm ring-1 ring-slate-700' 
                        : 'bg-white shadow-sm ring-1 ring-slate-200';
                }

                const iconColor = isActive ? theme.colors.primary : 'currentColor';
                const iconOpacity = isActive ? 'opacity-100' : 'opacity-50 group-hover:opacity-100';
                const textStyle = isActive ? 'font-semibold' : 'opacity-80';

                const html = `
                    <button onclick="selectTheme('${theme.id}')" class="w-full text-left px-3 py-3 rounded-xl flex items-center justify-between transition-all group ${bgClasses}">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <i data-lucide="${theme.icon}" class="w-[18px] h-[18px] flex-shrink-0 ${iconOpacity}" style="color: ${iconColor};"></i>
                            <span class="font-bangla text-[15px] truncate ${textStyle}">${theme.title}</span>
                        </div>
                        <div class="flex gap-1 ml-2 flex-shrink-0">
                            <div class="w-3 h-3 rounded-full" style="background-color: ${theme.colors.primary}"></div>
                            <div class="w-3 h-3 rounded-full" style="background-color: ${theme.colors.accent}"></div>
                        </div>
                    </button>
                `;

                if (theme.category === "Global") {
                    globalList.insertAdjacentHTML('beforeend', html);
                } else {
                    chapterList.insertAdjacentHTML('beforeend', html);
                }
            });

            lucide.createIcons();
        }

        function getCSSSnippet(theme) {
            return `/* Theme: ${theme.title} (${theme.id}) */
.theme-${theme.id} {
  --theme-primary: ${theme.colors.primary};
  --theme-accent: ${theme.colors.accent};
  --theme-bg: ${theme.colors.light.bg};
  --theme-text: ${theme.colors.light.text};
}

[data-theme="dark"] .theme-${theme.id} {
  --theme-bg: ${theme.colors.dark.bg};
  --theme-text: ${theme.colors.dark.text};
}`;
        }

        function createSwatch(label, hex) {
            return `
                <div class="rounded-xl p-3 border group transition-transform hover:-translate-y-1 bg-white border-slate-200 dark:bg-slate-900 dark:border-slate-800">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-semibold font-poppins opacity-60">${label}</span>
                    </div>
                    <div class="h-16 w-full rounded-lg mb-3 shadow-inner border border-black/5" style="background-color: ${hex}"></div>
                    <button 
                        onclick="copyToClipboard('${hex}', 'Copied ${hex}')"
                        class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm font-poppins font-medium transition-colors bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700"
                    >
                        <span>${hex.toUpperCase()}</span>
                        <i data-lucide="copy" class="w-3.5 h-3.5 opacity-40 group-hover:opacity-100"></i>
                    </button>
                </div>
            `;
        }

        function createPreviewCard(theme, isTestDark) {
            const bg = isTestDark ? theme.colors.dark.bg : theme.colors.light.bg;
            const text = isTestDark ? theme.colors.dark.text : theme.colors.light.text;
            const modeText = isTestDark ? 'Dark Mode Test' : 'Light Mode Test';
            const modeIcon = isTestDark ? 'moon' : 'sun';

            return `
                <div class="flex flex-col">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <span class="text-sm font-semibold font-poppins opacity-60 flex items-center gap-2">
                            <i data-lucide="${modeIcon}" class="w-3.5 h-3.5"></i> ${modeText}
                        </span>
                    </div>
                    <div class="rounded-2xl overflow-hidden border transition-all duration-300 shadow-lg flex flex-col h-full"
                         style="background-color: ${bg}; color: ${text}; border-color: color-mix(in srgb, ${theme.colors.primary} 30%, transparent);">
                        
                        <div class="flex h-3">
                            <div class="w-[60%]" style="background-color: ${theme.colors.primary}"></div>
                            <div class="w-[40%]" style="background-color: ${theme.colors.accent}"></div>
                        </div>

                        <div class="p-6 border-b flex justify-between items-start" style="border-bottom-color: color-mix(in srgb, ${theme.colors.primary} 20%, transparent);">
                            <div>
                                <div class="text-sm font-poppins font-medium mb-1 opacity-80">${theme.sub}</div>
                                <h2 class="text-xl font-bold font-bangla">${theme.title}</h2>
                            </div>
                            <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color: color-mix(in srgb, ${theme.colors.primary} 15%, transparent); color: ${theme.colors.primary};">
                                <i data-lucide="${theme.icon}" class="w-6 h-6"></i>
                            </div>
                        </div>

                        <div class="p-6 flex-grow">
                            <div class="inline-block px-3 py-1 rounded-md text-xs font-bold font-poppins mb-4 uppercase tracking-wider" style="background-color: color-mix(in srgb, ${theme.colors.accent} 15%, transparent); color: ${theme.colors.accent};">
                                Accent Highlight
                            </div>
                            <p class="font-bangla leading-relaxed opacity-90 mb-4 text-base">${theme.desc}</p>
                            <p class="text-sm opacity-80 leading-relaxed font-poppins">
                                Visual contrast test. Text must remain readable against the <span class="font-semibold" style="color: ${theme.colors.primary}">Primary</span> color and standard backgrounds.
                            </p>
                        </div>

                        <div class="p-6 pt-0 mt-auto">
                            <button class="w-full py-3 px-4 rounded-xl font-semibold flex justify-center items-center gap-2 hover:opacity-90 transition-opacity" style="background-color: ${theme.colors.primary}; color: #ffffff;">
                                <span class="font-bangla">বিস্তারিত দেখুন</span>
                                <i data-lucide="arrow-right" class="w-[18px] h-[18px]"></i>
                            </button>
                        </div>

                    </div>
                </div>
            `;
        }

        function renderMain() {
            const main = document.getElementById('main-content');
            const cssString = getCSSSnippet(activeTheme);
            const encodedCssString = cssString.replace(/'/g, "\\'").replace(/\n/g, "\\n");

            main.innerHTML = `
                <!-- Header Info -->
                <div class="flex items-start gap-5">
                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center shadow-sm" style="background-color: ${activeTheme.colors.primary}20; color: ${activeTheme.colors.primary};">
                        <i data-lucide="${activeTheme.icon}" class="w-8 h-8 stroke-[2.5px]"></i>
                    </div>
                    <div>
                        <div class="text-sm font-semibold font-poppins tracking-wide uppercase opacity-70 mb-1" style="color: ${activeTheme.colors.primary}">${activeTheme.sub} • ${activeTheme.category}</div>
                        <h2 class="text-3xl font-bold font-bangla mb-2">${activeTheme.title}</h2>
                        <p class="opacity-80 font-bangla text-lg">${activeTheme.desc}</p>
                    </div>
                </div>

                <!-- PALETTE INSPECTOR -->
                <section>
                    <div class="flex items-center gap-2 mb-4 font-poppins">
                        <i data-lucide="palette" class="w-5 h-5 opacity-60"></i>
                        <h3 class="text-lg font-semibold">Palette Inspector</h3>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-6 gap-4">
                        ${createSwatch('Primary', activeTheme.colors.primary)}
                        ${createSwatch('Accent', activeTheme.colors.accent)}
                        ${createSwatch('Light BG', activeTheme.colors.light.bg)}
                        ${createSwatch('Light Text', activeTheme.colors.light.text)}
                        ${createSwatch('Dark BG', activeTheme.colors.dark.bg)}
                        ${createSwatch('Dark Text', activeTheme.colors.dark.text)}
                    </div>
                </section>

                <!-- A/B QA TESTING AREA -->
                <section>
                    <div class="flex items-center justify-between mb-4 font-poppins">
                        <div class="flex items-center gap-2">
                            <i data-lucide="layout-template" class="w-5 h-5 opacity-60"></i>
                            <h3 class="text-lg font-semibold">A/B Testing / Component QA</h3>
                        </div>
                        <span class="text-sm opacity-60 bg-slate-500/10 px-3 py-1 rounded-full font-medium">Side-by-side contrast check</span>
                    </div>
                    <div class="grid lg:grid-cols-2 gap-6">
                        ${createPreviewCard(activeTheme, false)}
                        ${createPreviewCard(activeTheme, true)}
                    </div>
                </section>

                <!-- CSS EXPORT -->
                <section>
                    <div class="flex items-center gap-2 mb-4 font-poppins">
                        <i data-lucide="code" class="w-5 h-5 opacity-60"></i>
                        <h3 class="text-lg font-semibold">CSS Variables</h3>
                    </div>
                    <div class="relative rounded-xl p-6 overflow-x-auto bg-slate-800 text-slate-100 dark:bg-slate-900 dark:border dark:border-slate-800">
                        <button 
                            onclick="copyToClipboard('${encodedCssString}', 'CSS Copied to Clipboard!')"
                            class="absolute top-4 right-4 p-2 rounded-lg bg-white/10 hover:bg-white/20 transition-colors"
                            title="Copy CSS"
                        >
                            <i data-lucide="copy" class="w-[18px] h-[18px]"></i>
                        </button>
                        <pre class="text-sm font-mono leading-relaxed"><code>${cssString}</code></pre>
                    </div>
                </section>
            `;

            lucide.createIcons();
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderMain();
        });

    </script>
</body>
</html>
