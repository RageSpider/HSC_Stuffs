<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme QA Toolkit | Vanilla JS</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.maateen.me/bangla/font.css" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CSS (via CDN for standalone use) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        bangla: ['Bangla', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 50;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300 antialiased h-screen flex flex-col overflow-hidden dark:bg-slate-950 dark:text-slate-200" id="app-body">

    <!-- Header -->
    <header class="flex-shrink-0 sticky top-0 z-10 flex justify-between items-center px-6 py-4 border-b border-slate-200 bg-white/80 backdrop-blur-md dark:border-slate-800 dark:bg-slate-950/80 transition-colors">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 text-white rounded-lg">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Theme <span class="text-indigo-500">Toolkit</span></h1>
        </div>
        <button 
            onclick="toggleGlobalMode()"
            id="global-mode-btn"
            class="flex items-center gap-2 px-4 py-2 rounded-full font-medium text-sm transition-colors bg-slate-200 hover:bg-slate-300 text-slate-900 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-white"
        >
            <i data-lucide="moon" class="w-4 h-4" id="global-mode-icon"></i>
            <span id="global-mode-text">Dark App UI</span>
        </button>
    </header>

    <!-- Main Workspace Layout -->
    <div class="flex flex-col lg:flex-row flex-grow overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-full lg:w-80 flex-shrink-0 overflow-y-auto border-r border-slate-200 bg-slate-50/50 p-4 dark:border-slate-800 dark:bg-slate-900/50 transition-colors">
            
            <div class="mb-6">
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 ml-2">Grammar Themes</h2>
                <div class="space-y-1" id="grammar-list"></div>
            </div>

            <div>
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 ml-2">Composition Themes</h2>
                <div class="space-y-1" id="composition-list"></div>
            </div>

        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-grow overflow-y-auto p-6 lg:p-10 space-y-10" id="main-content">
            <!-- Rendered by JS -->
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast flex items-center gap-2 shadow-lg shadow-emerald-500/20">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-msg">Copied!</span>
    </div>

    <!-- Application Logic -->
    <script>
        // --- DATA: ALL 20 THEMES ---
        const THEMES = [
            { id: "pronunciation", category: "Grammar", title: "উচ্চারণের নিয়ম", sub: "Topic 01", icon: "mic", desc: "অ-ধ্বনি, এ-ধ্বনি এবং ফলার উচ্চারণ ও বোর্ড প্রশ্ন।", colors: { primary: "#d21820", accent: "#f6d10d", light: { bg: "#fffaf5", text: "#813c2c" }, dark: { bg: "#2b140f", text: "#f8d6a6" } } },
            { id: "spelling", category: "Grammar", title: "বানানের নিয়ম", sub: "Topic 02", icon: "spell-check", desc: "বাংলা একাডেমি প্রমিত বানানের নিয়ম ও শুদ্ধিকরণ।", colors: { primary: "#0d9488", accent: "#0284c7", light: { bg: "#f0fdfa", text: "#134e4a" }, dark: { bg: "#042f2e", text: "#ccfbf1" } } },
            { id: "grammar", category: "Grammar", title: "শব্দশ্রেণি", sub: "Topic 03", icon: "layers", desc: "বিশেষ্য, বিশেষণ, সর্বনাম, ক্রিয়া ও অন্যান্য পদের চেনা।", colors: { primary: "#6366f1", accent: "#ec4899", light: { bg: "#eef2ff", text: "#312e81" }, dark: { bg: "#1e1b4b", text: "#e0e7ff" } } },
            { id: "word-form", category: "Grammar", title: "শব্দ গঠন", sub: "Topic 04", icon: "puzzle", desc: "সমাস, উপসর্গ এবং প্রত্যয়ের সাহায্যে শব্দ গঠন।", colors: { primary: "#f59e0b", accent: "#ef4444", light: { bg: "#fffbeb", text: "#78350f" }, dark: { bg: "#451a03", text: "#fef3c7" } } },
            { id: "syntax", category: "Grammar", title: "বাক্যতত্ত্ব", sub: "Topic 05", icon: "wrap-text", desc: "সার্থক বাক্যের গুণ, গঠন অনুযায়ী বাক্যের প্রকারভেদ।", colors: { primary: "#3b82f6", accent: "#06b6d4", light: { bg: "#eff6ff", text: "#1e3a8a" }, dark: { bg: "#172554", text: "#dbeafe" } } },
            { id: "correction", category: "Grammar", title: "অপপ্রয়োগ ও শুদ্ধ প্রয়োগ", sub: "Topic 06", icon: "check-circle-2", desc: "বাক্যে শব্দের অপপ্রয়োগ ও শুদ্ধ বাক্য গঠন।", colors: { primary: "#e11d48", accent: "#f59e0b", light: { bg: "#fff1f2", text: "#881337" }, dark: { bg: "#4c0519", text: "#ffe4e6" } } },
            { id: "terminology", category: "Composition", title: "পারিভাষিক শব্দ", sub: "Topic 07(ক)", icon: "book-a", desc: "ইংরেজি শব্দের বাংলা পরিভাষা।", colors: { primary: "#475569", accent: "#3b82f6", light: { bg: "#f8fafc", text: "#0f172a" }, dark: { bg: "#0f172a", text: "#f1f5f9" } } },
            { id: "translation", category: "Composition", title: "অনুবাদ", sub: "Topic 07(খ)", icon: "languages", desc: "ইংরেজি থেকে বাংলা বঙ্গানুবাদ।", colors: { primary: "#8b5cf6", accent: "#d946ef", light: { bg: "#f5f3ff", text: "#4c1d95" }, dark: { bg: "#2e1065", text: "#ede9fe" } } },
            { id: "diary", category: "Composition", title: "দিনলিপি", sub: "Topic 08(ক)", icon: "book", desc: "দৈনন্দিন জীবনের গুরুত্বপূর্ণ ঘটনা লিখন।", colors: { primary: "#10b981", accent: "#f59e0b", light: { bg: "#ecfdf5", text: "#064e3b" }, dark: { bg: "#064e3b", text: "#d1fae5" } } },
            { id: "experience", category: "Composition", title: "অভিজ্ঞতা বর্ণন", sub: "Topic 08(ক)", icon: "camera", desc: "ভ্রমণ বা বিশেষ ঘটনার বর্ণনা।", colors: { primary: "#06b6d4", accent: "#8b5cf6", light: { bg: "#ecfeff", text: "#164e63" }, dark: { bg: "#083344", text: "#cffafe" } } },
            { id: "report", category: "Composition", title: "প্রতিবেদন রচনা", sub: "Topic 08(খ)", icon: "clipboard-list", desc: "সংবাদপত্র বা প্রাতিষ্ঠানিক প্রতিবেদন।", colors: { primary: "#991b1b", accent: "#d97706", light: { bg: "#fef2f2", text: "#450a0a" }, dark: { bg: "#450a0a", text: "#fecaca" } } },
            { id: "speech", category: "Composition", title: "ভাষণ লিখন", sub: "Topic 08(খ)", icon: "mic-2", desc: "বিভিন্ন অনুষ্ঠানে দেওয়ার জন্য বক্তব্য।", colors: { primary: "#f97316", accent: "#e11d48", light: { bg: "#fff7ed", text: "#7c2d12" }, dark: { bg: "#431407", text: "#ffedd5" } } },
            { id: "email", category: "Composition", title: "বৈদ্যুতিন চিঠি (ই-মেইল)", sub: "Topic 09(ক)", icon: "mail", desc: "আধুনিক যোগাযোগ মাধ্যমের পত্র।", colors: { primary: "#0ea5e9", accent: "#6366f1", light: { bg: "#f0f9ff", text: "#0c4a6e" }, dark: { bg: "#082f49", text: "#e0f2fe" } } },
            { id: "sms", category: "Composition", title: "ক্ষুদেবার্তা", sub: "Topic 09(ক)", icon: "smartphone", desc: "মোবাইল ফোনে যোগাযোগের জন্য বার্তা লিখন।", colors: { primary: "#be185d", accent: "#0f766e", light: { bg: "#fdf2f8", text: "#831843" }, dark: { bg: "#500724", text: "#fbcfe8" } } },
            { id: "letter", category: "Composition", title: "পত্রলিখন", sub: "Topic 09(খ)", icon: "file-signature", desc: "প্রাতিষ্ঠানিক ও ব্যক্তিগত পত্র।", colors: { primary: "#78716c", accent: "#b45309", light: { bg: "#fafaf9", text: "#292524" }, dark: { bg: "#1c1917", text: "#e7e5e4" } } },
            { id: "summary", category: "Composition", title: "সারাংশ/সারমর্ম", sub: "Topic 10(ক)", icon: "minimize-2", desc: "বড় লেখার মূলভাব সংক্ষেপে লিখন।", colors: { primary: "#84cc16", accent: "#06b6d4", light: { bg: "#f7fee7", text: "#365314" }, dark: { bg: "#1a2e05", text: "#ecfccb" } } },
            { id: "amplification", category: "Composition", title: "ভাব-সম্প্রসারণ", sub: "Topic 10(খ)", icon: "maximize-2", desc: "ছোট বাক্যের গভীর অর্থ বিশ্লেষণ।", colors: { primary: "#d946ef", accent: "#f59e0b", light: { bg: "#fdf4ff", text: "#701a75" }, dark: { bg: "#4a044e", text: "#fae8ff" } } },
            { id: "dialogue", category: "Composition", title: "সংলাপ রচনা", sub: "Topic 11(ক)", icon: "message-square", desc: "দুই বা ততোধিক ব্যক্তির কথোপকথন।", colors: { primary: "#ec4899", accent: "#8b5cf6", light: { bg: "#fdf2f8", text: "#831843" }, dark: { bg: "#500724", text: "#fce7f3" } } },
            { id: "story", category: "Composition", title: "খুদে গল্প লিখন", sub: "Topic 11(খ)", icon: "feather", desc: "উদ্দীপক বা সংকেত নির্ভর গল্প লিখন।", colors: { primary: "#eab308", accent: "#ef4444", light: { bg: "#fefce8", text: "#713f12" }, dark: { bg: "#422006", text: "#fef08a" } } },
            { id: "essay", category: "Composition", title: "প্রবন্ধ রচনা", sub: "Topic 12", icon: "file-text", desc: "বিভিন্ন বিষয়ের ওপর প্রবন্ধ রচনা।", colors: { primary: "#64748b", accent: "#10b981", light: { bg: "#f8fafc", text: "#0f172a" }, dark: { bg: "#020617", text: "#f8fafc" } } }
        ];

        // --- STATE ---
        let activeTheme = THEMES[0];
        let isDarkMode = false;

        // --- CORE FUNCTIONS ---

        function toggleGlobalMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            
            const icon = document.getElementById('global-mode-icon');
            const text = document.getElementById('global-mode-text');
            
            icon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            text.textContent = isDarkMode ? 'Light App UI' : 'Dark App UI';
            
            lucide.createIcons();
            renderSidebar(); // Re-render sidebar to update active states based on mode
        }

        function selectTheme(themeId) {
            activeTheme = THEMES.find(t => t.id === themeId);
            renderSidebar();
            renderMain();
        }

        function copyToClipboard(text, message = 'Copied!') {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast(message));
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { 
                    document.execCommand('copy'); 
                    showToast(message);
                } catch (err) { 
                    console.error('Failed to copy', err); 
                }
                textArea.remove();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // --- RENDERING FUNCTIONS ---

        function renderSidebar() {
            const grammarList = document.getElementById('grammar-list');
            const compList = document.getElementById('composition-list');
            
            grammarList.innerHTML = '';
            compList.innerHTML = '';

            THEMES.forEach(theme => {
                const isActive = activeTheme.id === theme.id;
                
                // Determine styling based on global dark mode and active state
                let bgClasses = 'hover:bg-slate-500/10';
                if (isActive) {
                    bgClasses = isDarkMode 
                        ? 'bg-slate-800 shadow-sm ring-1 ring-slate-700' 
                        : 'bg-white shadow-sm ring-1 ring-slate-200';
                }

                const iconColor = isActive ? theme.colors.primary : 'currentColor';
                const iconOpacity = isActive ? 'opacity-100' : 'opacity-50 group-hover:opacity-100';
                const textStyle = isActive ? 'font-semibold' : 'opacity-80';

                const html = `
                    <button onclick="selectTheme('${theme.id}')" class="w-full text-left px-3 py-3 rounded-xl flex items-center justify-between transition-all group ${bgClasses}">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <i data-lucide="${theme.icon}" class="w-[18px] h-[18px] flex-shrink-0 ${iconOpacity}" style="color: ${iconColor};"></i>
                            <span class="font-bangla truncate ${textStyle}">${theme.title}</span>
                        </div>
                        <div class="flex gap-1 ml-2 flex-shrink-0">
                            <div class="w-3 h-3 rounded-full" style="background-color: ${theme.colors.primary}"></div>
                            <div class="w-3 h-3 rounded-full" style="background-color: ${theme.colors.accent}"></div>
                        </div>
                    </button>
                `;

                if (theme.category === "Grammar") {
                    grammarList.insertAdjacentHTML('beforeend', html);
                } else {
                    compList.insertAdjacentHTML('beforeend', html);
                }
            });

            lucide.createIcons();
        }

        function getCSSSnippet(theme) {
            return `/* Theme: ${theme.title} (${theme.id}) */
.theme-${theme.id} {
  --theme-primary: ${theme.colors.primary};
  --theme-accent: ${theme.colors.accent};
  --theme-bg: ${theme.colors.light.bg};
  --theme-text: ${theme.colors.light.text};
}

[data-theme="dark"] .theme-${theme.id} {
  --theme-bg: ${theme.colors.dark.bg};
  --theme-text: ${theme.colors.dark.text};
}`;
        }

        function createSwatch(label, hex) {
            return `
                <div class="rounded-xl p-3 border group transition-transform hover:-translate-y-1 bg-white border-slate-200 dark:bg-slate-900 dark:border-slate-800">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-semibold opacity-60">${label}</span>
                    </div>
                    <div class="h-16 w-full rounded-lg mb-3 shadow-inner border border-black/5" style="background-color: ${hex}"></div>
                    <button 
                        onclick="copyToClipboard('${hex}', 'Copied ${hex}')"
                        class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm font-mono transition-colors bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700"
                    >
                        <span>${hex.toUpperCase()}</span>
                        <i data-lucide="copy" class="w-3.5 h-3.5 opacity-40 group-hover:opacity-100"></i>
                    </button>
                </div>
            `;
        }

        function createPreviewCard(theme, isTestDark) {
            const bg = isTestDark ? theme.colors.dark.bg : theme.colors.light.bg;
            const text = isTestDark ? theme.colors.dark.text : theme.colors.light.text;
            const modeText = isTestDark ? 'Dark Mode Test' : 'Light Mode Test';
            const modeIcon = isTestDark ? 'moon' : 'sun';

            return `
                <div class="flex flex-col">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <span class="text-sm font-semibold opacity-60 flex items-center gap-2">
                            <i data-lucide="${modeIcon}" class="w-3.5 h-3.5"></i> ${modeText}
                        </span>
                    </div>
                    <div class="rounded-2xl overflow-hidden border transition-all duration-300 shadow-lg flex flex-col h-full"
                         style="background-color: ${bg}; color: ${text}; border-color: color-mix(in srgb, ${theme.colors.primary} 30%, transparent);">
                        
                        <div class="flex h-3">
                            <div class="w-[60%]" style="background-color: ${theme.colors.primary}"></div>
                            <div class="w-[40%]" style="background-color: ${theme.colors.accent}"></div>
                        </div>

                        <div class="p-6 border-b flex justify-between items-start" style="border-bottom-color: color-mix(in srgb, ${theme.colors.primary} 20%, transparent);">
                            <div>
                                <div class="text-sm font-bangla mb-1 opacity-80">${theme.sub}</div>
                                <h2 class="text-xl font-bold font-bangla">${theme.title}</h2>
                            </div>
                            <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color: color-mix(in srgb, ${theme.colors.primary} 15%, transparent); color: ${theme.colors.primary};">
                                <i data-lucide="${theme.icon}" class="w-6 h-6"></i>
                            </div>
                        </div>

                        <div class="p-6 flex-grow">
                            <div class="inline-block px-3 py-1 rounded-md text-xs font-bold mb-4 uppercase tracking-wider" style="background-color: color-mix(in srgb, ${theme.colors.accent} 15%, transparent); color: ${theme.colors.accent};">
                                Accent Highlight
                            </div>
                            <p class="font-bangla leading-relaxed opacity-90 mb-4 text-base">${theme.desc}</p>
                            <p class="text-sm opacity-80 leading-relaxed font-sans">
                                Visual contrast test. Text must remain readable against the <span class="font-semibold" style="color: ${theme.colors.primary}">Primary</span> color and standard backgrounds.
                            </p>
                        </div>

                        <div class="p-6 pt-0 mt-auto">
                            <button class="w-full py-3 px-4 rounded-xl font-semibold flex justify-center items-center gap-2 hover:opacity-90 transition-opacity" style="background-color: ${theme.colors.primary}; color: #ffffff;">
                                <span class="font-bangla">বিস্তারিত</span>
                                <i data-lucide="arrow-right" class="w-[18px] h-[18px]"></i>
                            </button>
                        </div>

                    </div>
                </div>
            `;
        }

        function renderMain() {
            const main = document.getElementById('main-content');
            const cssString = getCSSSnippet(activeTheme);
            const encodedCssString = cssString.replace(/'/g, "\\'").replace(/\n/g, "\\n");

            main.innerHTML = `
                <!-- Header Info -->
                <div class="flex items-start gap-5">
                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center shadow-sm" style="background-color: ${activeTheme.colors.primary}20; color: ${activeTheme.colors.primary};">
                        <i data-lucide="${activeTheme.icon}" class="w-8 h-8 stroke-[2.5px]"></i>
                    </div>
                    <div>
                        <div class="text-sm font-semibold tracking-wide uppercase opacity-70 mb-1" style="color: ${activeTheme.colors.primary}">${activeTheme.sub} • ${activeTheme.category}</div>
                        <h2 class="text-3xl font-bold font-bangla mb-2">${activeTheme.title}</h2>
                        <p class="opacity-80 font-bangla text-lg">${activeTheme.desc}</p>
                    </div>
                </div>

                <!-- PALETTE INSPECTOR -->
                <section>
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="palette" class="w-5 h-5 opacity-60"></i>
                        <h3 class="text-lg font-semibold">Palette Inspector</h3>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-6 gap-4">
                        ${createSwatch('Primary', activeTheme.colors.primary)}
                        ${createSwatch('Accent', activeTheme.colors.accent)}
                        ${createSwatch('Light BG', activeTheme.colors.light.bg)}
                        ${createSwatch('Light Text', activeTheme.colors.light.text)}
                        ${createSwatch('Dark BG', activeTheme.colors.dark.bg)}
                        ${createSwatch('Dark Text', activeTheme.colors.dark.text)}
                    </div>
                </section>

                <!-- A/B QA TESTING AREA -->
                <section>
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <i data-lucide="layout-template" class="w-5 h-5 opacity-60"></i>
                            <h3 class="text-lg font-semibold">A/B Testing / Component QA</h3>
                        </div>
                        <span class="text-sm opacity-60 bg-slate-500/10 px-3 py-1 rounded-full font-medium">Side-by-side contrast check</span>
                    </div>
                    <div class="grid lg:grid-cols-2 gap-6">
                        ${createPreviewCard(activeTheme, false)}
                        ${createPreviewCard(activeTheme, true)}
                    </div>
                </section>

                <!-- CSS EXPORT -->
                <section>
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="code" class="w-5 h-5 opacity-60"></i>
                        <h3 class="text-lg font-semibold">CSS Variables</h3>
                    </div>
                    <div class="relative rounded-xl p-6 overflow-x-auto bg-slate-800 text-slate-100 dark:bg-slate-900 dark:border dark:border-slate-800">
                        <button 
                            onclick="copyToClipboard('${encodedCssString}', 'CSS Copied to Clipboard!')"
                            class="absolute top-4 right-4 p-2 rounded-lg bg-white/10 hover:bg-white/20 transition-colors"
                            title="Copy CSS"
                        >
                            <i data-lucide="copy" class="w-[18px] h-[18px]"></i>
                        </button>
                        <pre class="text-sm font-mono leading-relaxed"><code>${cssString}</code></pre>
                    </div>
                </section>
            `;

            lucide.createIcons();
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderMain();
        });

    </script>
</body>
</html>
