<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বঙ্গানুবাদ | বাংলা ২য় পত্র</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.maateen.me/bangla/font.css" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../topic-css/translation.css">
</head>
<body class="theme-translation"> 

    <div id="navbar-placeholder"></div>

    <main class="topic-main">
        <header class="topic-hero">
            
            <!-- Swiss Brutalist Typographic Background -->
            <div class="hero-swiss-bg">
                <div class="block-primary">
                    <span class="swiss-tag en-text">EN</span>
                </div>
                <div class="block-secondary">
                    <span class="swiss-tag bn-text">বাং</span>
                </div>
                <div class="swiss-hollow-text en-text">
                    TRANSLATION
                </div>
                <div class="swiss-solid-text bn-text">
                    অনুবাদ
                </div>
            </div>

            <div class="hero-content solid-card">
                <span class="topic-badge bn-text"><i data-lucide="languages"></i> ব্যাকরণ: প্রশ্ন ৭(খ)</span>
                <h1 class="bn-text">বঙ্গানুবাদ</h1>
                <p class="bn-text marks-info">এই অংশে মোট <strong>১০ নম্বর</strong> বরাদ্দ রয়েছে।</p>
                <p class="bn-text hero-desc">গুরুত্বপূর্ণ ইংরেজি অনুচ্ছেদগুলোর প্রাঞ্জল ও আক্ষরিক বঙ্গানুবাদ এবং বিগত সালের বোর্ড প্রশ্নোত্তর।</p>
                
                <div class="page-tabs bn-text">
                    <button class="tab-btn bn-text active" onclick="switchTab('section-archive')" data-target="section-archive">
                        <i data-lucide="library"></i> অনুচ্ছেদ সংগ্রহ
                    </button>
                    <button class="tab-btn bn-text" onclick="switchTab('section-practice')" data-target="section-practice">
                        <i data-lucide="brain-circuit"></i> ফোকাস মোড
                    </button>
                </div>
            </div>
            
        </header>

        <div class="pages-container container">
            
            <div class="smart-toolbar">
                <div class="search-box">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="global-search" class="bn-text" placeholder="ইংরেজি বা বাংলা শব্দ দিয়ে খুঁজুন...">
                    <button id="clearSearch" class="clear-btn" aria-label="Clear Search"><i data-lucide="x"></i></button>
                </div>
                
                <div class="filter-group bn-text">
                    <div class="filter-item">
                        <i data-lucide="building-2"></i>
                        <select id="filter-board" class="bn-text">
                            <option value="all">সব বোর্ড</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <i data-lucide="calendar"></i>
                        <select id="filter-year" class="bn-text">
                            <option value="all">সব সাল</option>
                        </select>
                    </div>
                    <button id="toggle-favorites" class="btn-favorite-filter bn-text">
                        <i data-lucide="bookmark"></i> <span class="hide-mobile">সংরক্ষিত</span>
                    </button>
                </div>
            </div>

            <section id="section-archive" class="pseudo-page active">
                <div class="passage-grid" id="passage-grid">
                    <div class="loading-state">
                        <i data-lucide="loader-2" class="spin"></i>
                        <p class="bn-text">অনুচ্ছেদ লোড হচ্ছে...</p>
                    </div>
                </div>
            </section>

            <section id="section-practice" class="pseudo-page" style="display: none;">
                <div class="focus-wrapper">
                    <div class="focus-container">
                        <div class="focus-card" id="focus-card">
                            <div class="focus-header">
                                <span class="fc-counter bn-text" id="fc-counter">0 / 0</span>
                                <div class="focus-actions">
                                    <span class="fc-boards bn-text" id="fc-boards-text"></span>
                                    <button class="fc-fav-btn" id="fc-fav-btn" title="সংরক্ষণ করুন">
                                        <i data-lucide="bookmark"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="focus-content">
                                <div class="en-section">
                                    <h3 class="en-text label"><i data-lucide="quote"></i> English Passage</h3>
                                    <p id="fc-en-text" class="en-text text-body">Loading...</p>
                                </div>
                                
                                <div class="divider"></div>
                                
                                <div class="bn-section">
                                    <button id="reveal-btn" class="reveal-btn bn-text">
                                        <i data-lucide="eye"></i> বঙ্গানুবাদ দেখুন
                                    </button>
                                    <div id="fc-bn-container" class="bn-content-hidden">
                                        <h3 class="bn-text label"><i data-lucide="check-circle-2"></i> বঙ্গানুবাদ</h3>
                                        <p id="fc-bn-text" class="bn-text text-body">...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="fc-controls">
                        <button class="fc-btn" id="fc-prev"><i data-lucide="arrow-left"></i></button>
                        <button class="fc-btn" id="fc-next"><i data-lucide="arrow-right"></i></button>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/include-navbar.js"></script>
    <script src="../js/include-footer.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../topic-js/translation.js"></script>

</body>
</html>
