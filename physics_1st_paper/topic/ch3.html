<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অধ্যায় ০৩: গতিবিদ্যা | Physics Master Guide</title>
    
    <link href="https://fonts.maateen.me/bangla/font.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- MathJax Configuration for LaTeX Rendering -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
    </script>

    <!-- Base Styles + Chapter Override -->
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../topic-css/ch3.css">
</head>
<body class="bn-text">
    
    <div id="navbar-placeholder"></div>

    <main>
        <section class="ch3-hero">
            <!-- Projectile Radar Background -->
            <div class="projectile-radar">
                <svg width="100%" height="100%" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
                    <defs>
                        <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:var(--primary-color);stop-opacity:0" />
                            <stop offset="100%" style="stop-color:var(--primary-color);stop-opacity:0.6" />
                        </linearGradient>
                    </defs>
                    <!-- Plotting Grids -->
                    <g class="radar-grid">
                        <line x1="50" y1="350" x2="750" y2="350" stroke="var(--primary-color)" stroke-opacity="0.2" />
                        <line x1="50" y1="50" x2="50" y2="350" stroke="var(--primary-color)" stroke-opacity="0.2" />
                    </g>
                    <!-- Projectile Path 1 -->
                    <path class="trace-path p1" d="M 50 350 Q 200 50 350 350" fill="none" stroke="url(#grad-cyan)" stroke-width="2" stroke-dasharray="600" stroke-dashoffset="600" />
                    <circle class="node p1-node" cx="200" cy="50" r="4" fill="var(--accent-color)" opacity="0" />
                    
                    <!-- Projectile Path 2 -->
                    <path class="trace-path p2" d="M 150 350 Q 400 150 650 350" fill="none" stroke="url(#grad-cyan)" stroke-width="2" stroke-dasharray="600" stroke-dashoffset="600" />
                    <circle class="node p2-node" cx="400" cy="150" r="4" fill="var(--accent-color)" opacity="0" />
                </svg>
            </div>

            <div class="container relative z-10">
                <div class="ch3-subtitle bn-text"><i data-lucide="navigation"></i> অধ্যায় ০৩</div>
                <h1 class="ch3-title bn-text">গতিবিদ্যা</h1>
                <p class="bn-text ch3-hero-desc">
                    প্রাস, গড় দ্রুতি, তাৎক্ষণিক বেগ, ত্বরণ এবং পরন্ত বস্তুর গতির গাণিতিক বিশ্লেষণ।
                </p>
            </div>
        </section>

        <section class="container" style="min-height: 60vh;">
            <div class="tab-container">
                <div class="tabs">
                    <button class="tab-btn active bn-text" data-tab="tab-formulas">
                        <i data-lucide="sigma"></i> প্রয়োজনীয় সূত্রাবলি
                    </button>
                    <button class="tab-btn bn-text" data-tab="tab-mcq">
                        <i data-lucide="check-square"></i> ডাইনামিক MCQ
                    </button>
                    <button class="tab-btn bn-text" data-tab="tab-cq">
                        <i data-lucide="pen-tool"></i> সৃজনশীল প্রশ্ন (CQ)
                    </button>
                </div>

                <div id="tab-formulas" class="tab-content active">
                    <div id="formula-container" class="formula-grid">
                        <div style="text-align:center; padding: 20px; width: 100%;">লোড হচ্ছে...</div>
                    </div>
                </div>

                <div id="tab-mcq" class="tab-content">
                    <div class="mcq-settings-panel">
                        <div class="settings-grid">
                            <div class="setting-group" style="grid-column: 1 / -1;">
                                <label><i data-lucide="search"></i> অনুসন্ধান</label>
                                <input type="text" id="mcq-search" class="search-input" placeholder="সার্চ করুন...">
                            </div>
                            <!-- Standard Filters -->
                            <div class="setting-group">
                                <label><i data-lucide="filter"></i> বোর্ড ফিল্টার</label>
                                <select id="mcq-board-filter"><option value="all">সকল বোর্ড</option></select>
                            </div>
                            <div class="setting-group">
                                <label><i data-lucide="calendar"></i> সাল ফিল্টার</label>
                                <select id="mcq-year-filter"><option value="all">সকল সাল</option></select>
                            </div>
                            <div class="setting-group">
                                <label><i data-lucide="layers"></i> প্রশ্নের ধরন</label>
                                <select id="mcq-type-filter">
                                    <option value="all">সকল প্রশ্ন</option>
                                    <option value="static">বইয়ের প্রশ্ন</option>
                                    <option value="dynamic">মান পরিবর্তনশীল</option>
                                </select>
                            </div>
                            <div class="setting-group">
                                <label><i data-lucide="book-open"></i> লার্নিং মোড</label>
                                <select id="mcq-mode-select">
                                    <option value="practice">প্র্যাকটিস মোড</option>
                                    <option value="teach">টিচিং মোড</option>
                                </select>
                            </div>
                            <div class="setting-group">
                                <label><i data-lucide="list-ordered"></i> প্রশ্নের সিরিয়াল</label>
                                <select id="mcq-serial-select">
                                    <option value="json">বইয়ের সিরিয়াল</option>
                                    <option value="random">এলোমেলো</option>
                                </select>
                            </div>
                            <div class="setting-group">
                                <label><i data-lucide="eye"></i> উত্তর প্রদর্শন</label>
                                <select id="mcq-answer-select">
                                    <option value="hide">ক্লিক করার পর দেখান</option>
                                    <option value="show">সব উত্তর আগেই দেখান</option>
                                </select>
                            </div>
                        </div>
                        <div class="mcq-controls">
                            <button id="regen-mcq-btn" class="action-btn bn-text">
                                <i data-lucide="refresh-cw"></i> নতুন সেট তৈরি করুন
                            </button>
                        </div>
                    </div>
                    <div id="dynamic-mcq-container"></div>
                </div>

                <div id="tab-cq" class="tab-content">
                    <div class="cq-sub-tabs">
                        <button class="cq-sub-tab-btn active bn-text" data-cq="ka">জ্ঞানমূলক (ক)</button>
                        <button class="cq-sub-tab-btn bn-text" data-cq="kha">অনুধাবনমূলক (খ)</button>
                        <button class="cq-sub-tab-btn bn-text" data-cq="ga-gha">প্রয়োগ ও উচ্চতর (গ, ঘ)</button>
                    </div>
                    <div class="mcq-settings-panel">
                        <div class="settings-grid">
                            <div class="setting-group" style="grid-column: 1 / -1;">
                                <label><i data-lucide="search"></i> অনুসন্ধান</label>
                                <input type="text" id="cq-search" class="search-input" placeholder="সার্চ করুন...">
                            </div>
                            <div class="setting-group">
                                <label><i data-lucide="filter"></i> বোর্ড ফিল্টার</label>
                                <select id="cq-board-filter"><option value="all">সকল বোর্ড</option></select>
                            </div>
                            <div class="setting-group">
                                <label><i data-lucide="calendar"></i> সাল ফিল্টার</label>
                                <select id="cq-year-filter"><option value="all">সকল সাল</option></select>
                            </div>
                            <div class="setting-group">
                                <label><i data-lucide="tag"></i> টপিক ফিল্টার</label>
                                <select id="cq-type-filter"><option value="all">সকল টপিক</option></select>
                            </div>
                        </div>
                    </div>
                    <div id="cq-container">
                        <div style="text-align:center; padding: 20px;">লোড হচ্ছে...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="scroll-fab-container" id="scroll-controls">
        <button class="scroll-fab" id="scroll-top-btn" title="উপরে যান"><i data-lucide="arrow-up"></i></button>
        <button class="scroll-fab" id="scroll-bottom-btn" title="নিচে যান"><i data-lucide="arrow-down"></i></button>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="../js/include-navbar.js"></script>
    <script src="../js/include-footer.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../topic-js/ch3.js"></script>
    <script src="../topic-data/ch3/scripts/mcq-generator.js"></script>
    <script src="../topic-data/ch3/scripts/mcq-function.js"></script>
    <script src="../topic-data/ch3/scripts/cq-function.js"></script>
</body>
</html>
