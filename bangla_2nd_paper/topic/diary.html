<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>দিনলিপি লিখন | বাংলা ২য় পত্র</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.maateen.me/bangla/font.css" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../topic-css/diary.css">
</head>
<body class="theme-diary"> 

    <div id="navbar-placeholder"></div>

    <main class="topic-main">
        <header class="topic-hero">
            
            <!-- Journal Aesthetic Background -->
            <div class="hero-journal-bg">
                <div class="bookmark-shape"></div>
                <div class="date-stamp">Oct 24</div>
            </div>

            <div class="hero-content solid-card">
                <span class="topic-badge bn-text"><i data-lucide="book-open-check"></i> নির্মিতি: প্রশ্ন ৮(ক)</span>
                <h1 class="bn-text">দিনলিপি লিখন</h1>
                <p class="bn-text marks-info">এই অংশে মোট <strong>১০ নম্বর</strong> বরাদ্দ রয়েছে।</p>
                <p class="bn-text hero-desc">পরীক্ষায় সাধারণত অনুভূতি ব্যক্তকরণ, কোনো অনুষ্ঠান বা ঘটনার বর্ণনা দিয়ে দিনলিপি (ডায়েরি) লিখতে বলা হয়। নিচের তালিকা থেকে গুরুত্বপূর্ণ দিনলিপিগুলো অনুশীলন করো।</p>
            </div>
            
        </header>

        <div class="pages-container container">
            
            <div class="smart-toolbar">
                <div class="search-box">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="global-search" class="bn-text" placeholder="দিনলিপির বিষয় খুঁজুন...">
                    <button id="clearSearch" class="clear-btn" aria-label="Clear Search"><i data-lucide="x"></i></button>
                </div>
                
                <div class="filter-group bn-text">
                    <div class="filter-item">
                        <i data-lucide="building-2"></i>
                        <select id="filter-board" class="bn-text">
                            <option value="all">সব বোর্ড</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <i data-lucide="calendar"></i>
                        <select id="filter-year" class="bn-text">
                            <option value="all">সব সাল</option>
                        </select>
                    </div>
                    <button id="toggle-favorites" class="btn-favorite-filter bn-text">
                        <i data-lucide="heart"></i> <span class="hide-mobile">পছন্দ</span>
                    </button>
                </div>
            </div>

            <section id="section-list" class="pseudo-page active">
                <div class="diary-grid" id="diary-container">
                    <div class="loading-state">
                        <i data-lucide="loader-2" class="spin"></i>
                        <p class="bn-text">দিনলিপি লোড হচ্ছে...</p>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../js/include-navbar.js"></script>
    <script src="../js/include-footer.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../topic-js/diary.js"></script>

</body>
</html>
